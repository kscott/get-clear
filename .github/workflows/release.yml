name: Build and Release PKG

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - name: Run tests
        run: swift run getclearkit-tests

  build:
    needs: test
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - name: Build get-clear umbrella binary
        run: |
          swift build -c release --product get-clear
          mkdir -p payload/usr/local/bin
          cp .build/release/get-clear payload/usr/local/bin/get-clear
          chmod +x payload/usr/local/bin/get-clear

      - name: Download binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for tool in reminders calendar contacts mail sms; do
            echo "Downloading $tool..."
            gh release download latest \
              --repo kscott/${tool}-cli \
              --pattern "${tool}-bin" \
              --output payload/usr/local/bin/$tool
            chmod +x payload/usr/local/bin/$tool
          done
          mkdir -p payload/usr/local/share/get-clear
          cp scripts/uninstall payload/usr/local/share/get-clear/uninstall.sh
          chmod +x payload/usr/local/share/get-clear/uninstall.sh
          mkdir -p payload/usr/local/share/zsh/site-functions
          cp completions/_get-clear completions/_reminders completions/_calendar \
             completions/_contacts completions/_mail completions/_sms \
             payload/usr/local/share/zsh/site-functions/

      - name: Build component package
        run: |
          pkgbuild \
            --root payload \
            --scripts pkg/scripts \
            --identifier com.kenscott.get-clear \
            --version "$VERSION" \
            --install-location / \
            get-clear-component.pkg

      - name: Build distribution package
        run: |
          productbuild \
            --distribution pkg/distribution.xml \
            --resources pkg/resources \
            --package-path . \
            get-clear-unsigned.pkg

      - name: Import Developer ID Installer certificate
        env:
          P12_DATA: ${{ secrets.DEVELOPER_ID_INSTALLER_P12 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_INSTALLER_P12_PASSWORD }}
        run: |
          KEYCHAIN=build.keychain
          security create-keychain -p "" $KEYCHAIN
          security default-keychain -s $KEYCHAIN
          security unlock-keychain -p "" $KEYCHAIN
          echo "$P12_DATA" | base64 --decode > /tmp/installer.p12
          security import /tmp/installer.p12 -k $KEYCHAIN -P "$P12_PASSWORD" -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" $KEYCHAIN
          rm /tmp/installer.p12

      - name: Sign package
        run: |
          productsign \
            --sign "Developer ID Installer: Kenneth Scott (6Q96Q79QN8)" \
            get-clear-unsigned.pkg \
            get-clear.pkg

      - name: Notarize and staple
        env:
          NOTARYTOOL_APPLE_ID: ${{ secrets.NOTARYTOOL_APPLE_ID }}
          NOTARYTOOL_PASSWORD: ${{ secrets.NOTARYTOOL_PASSWORD }}
          NOTARYTOOL_TEAM_ID: ${{ secrets.NOTARYTOOL_TEAM_ID }}
        run: |
          xcrun notarytool submit get-clear.pkg \
            --apple-id "$NOTARYTOOL_APPLE_ID" \
            --password "$NOTARYTOOL_PASSWORD" \
            --team-id "$NOTARYTOOL_TEAM_ID" \
            --wait
          xcrun stapler staple get-clear.pkg

      - name: Create versioned release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v$VERSION" > /dev/null 2>&1; then
            gh release edit "v$VERSION" \
              --title "Get Clear $VERSION" \
              --notes "Installs all five Get Clear tools to /usr/local/bin. Double-click get-clear.pkg to install." \
              --latest
            gh release upload "v$VERSION" get-clear.pkg --clobber
          else
            gh release create "v$VERSION" get-clear.pkg \
              --title "Get Clear $VERSION" \
              --notes "Installs all five Get Clear tools to /usr/local/bin. Double-click get-clear.pkg to install." \
              --latest
          fi

      - name: Update rolling release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload latest get-clear.pkg --clobber
          gh release edit latest \
            --title "Get Clear $VERSION" \
            --notes "Installs all five Get Clear tools to /usr/local/bin. Double-click get-clear.pkg to install."

  smoke-test:
    runs-on: macos-latest
    needs: build

    steps:
      - name: Download PKG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download latest \
            --repo kscott/get-clear \
            --pattern "get-clear.pkg" \
            --output get-clear.pkg

      - name: Install PKG
        run: sudo installer -pkg get-clear.pkg -target /

      - name: Smoke test — version flags
        run: |
          get-clear --version
          reminders --version
          calendar --version
          contacts --version
          mail --version
          sms --version

      - name: Smoke test — basic commands
        run: |
          get-clear help
          reminders help
          calendar help
          contacts help
          mail help
          sms help
